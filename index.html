<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="theme-color" content="#ffffff">
    <title>GXMBY Music</title>
    <link rel="stylesheet" href="style-music.css">
</head>
<body>
    <canvas id="particleCanvas"></canvas>
    <audio id="audioPlayer" preload="auto" hidden>
        <source src="audio/Expressions.wav" type="audio/wav">
    </audio>
    <div class="content-wrapper">
        <div class="text-container">
            <div class="video-embed">

                    id="heroVideo"

                    title="YouTube video player"
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                    referrerpolicy="strict-origin-when-cross-origin"
                    allowfullscreen
                ></iframe>
            </div>
            <h1 id="mainText">GXMBY</h1>
        </div>
        
        <div class="social-links">
            <a href="https://instagram.com/gxmby" target="_blank" rel="noopener noreferrer">instagram</a>
            <a href="https://x.com/gxmbysk" target="_blank" rel="noopener noreferrer">x</a>
            <a href="https://soundcloud.com/gxmby" target="_blank" rel="noopener noreferrer">soundcloud</a>
        </div>
    </div>
    
    <script src="particles.js"></script>
    <script src="audio-reactive.js"></script>
    <script src="video-player.js"></script>
</body>
</html>
